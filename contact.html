<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BENNION-BROWN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex-shrink-0 flex items-center group cursor-pointer relative">
                <img src="Gemini_Generated_Image_zh6858zh6858zh68.png" alt="BENNION-BROWN Logo" class="h-16 w-16 object-cover rounded-xl shadow-lg border-2 border-blue-900/10 transition-all duration-500 ease-out group-hover:scale-125 group-active:scale-150 z-50">
                <span class="ml-4 text-2xl font-bold tracking-tighter text-blue-900">BENNION-BROWN</span>
            </div>
            <div class="hidden md:flex space-x-8 font-medium items-center">
                <a href="index.html" class="text-gray-600 hover:text-blue-900 transition">Home</a>
                <a href="rentals.html" class="text-gray-600 hover:text-blue-900 transition">Rentals</a>
                <a href="aboutus.html" class="text-gray-600 hover:text-blue-900 transition">About Us</a>
                <a href="contact.html" class="text-blue-900 font-bold border-b-2 border-blue-900">Contact</a>
            </div>
        </div>
    </nav>

    <section class="py-16 bg-blue-900 text-white text-center">
        <h2 class="text-4xl font-extrabold mb-4 text-white">Connect With Us</h2>
        <p class="text-xl text-blue-100">Direct access to Josh & Christian.</p>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-20 grid grid-cols-1 md:grid-cols-2 gap-16">
        <div>
            <h3 class="text-3xl font-bold text-blue-900 mb-6">Call or Text Anytime</h3>
            <div class="space-y-8">
                <div class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100">
                    <div class="bg-blue-100 p-4 rounded-full text-blue-900"><i class="fas fa-phone-alt"></i></div>
                    <div class="ml-6">
                        <h4 class="font-bold text-gray-900">Josh Bennion</h4>
                        <a href="tel:8018704122" class="text-blue-700 text-lg hover:underline">801-870-4122</a>
                    </div>
                </div>
                <div class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-gray-100">
                    <div class="bg-blue-100 p-4 rounded-full text-blue-900"><i class="fas fa-phone-alt"></i></div>
                    <div class="ml-6">
                        <h4 class="font-bold text-gray-900">Christian Brown</h4>
                        <a href="tel:7608224959" class="text-blue-700 text-lg hover:underline">760-822-4959</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-10 rounded-2xl shadow-2xl border border-gray-100">
            <h3 class="text-2xl font-bold mb-6 text-gray-900">Send an Inquiry</h3>
            <form action="https://formspree.io/f/xvgowqbr" method="POST" class="space-y-5">
                <input type="text" name="name" required placeholder="Full Name" class="w-full px-4 py-3 rounded-lg border border-gray-300">
                <input type="email" name="email" required placeholder="Email Address" class="w-full px-4 py-3 rounded-lg border border-gray-300">
                <textarea name="message" rows="5" required placeholder="How can we help you?" class="w-full px-4 py-3 rounded-lg border border-gray-300"></textarea>
                <button type="submit" class="w-full bg-blue-900 text-white font-bold py-4 rounded-lg hover:bg-blue-800 transition">Submit Message</button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 text-center">
        <p class="text-sm text-gray-500">© 2026 BENNION-BROWN. All Rights Reserved.</p>
    </footer>
</body>
</html>
